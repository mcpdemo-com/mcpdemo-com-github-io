<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — MCP Demo</title>
  <meta http-equiv="refresh" content="5;url=/" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=IBM+Plex+Sans:wght@400&display=swap" rel="stylesheet" />
  <script src="https://analytics.ahrefs.com/analytics.js" data-key="9+8emHsZ/uAGZescpbe7Tg" async></script>
  <style>
    :root { --bg:#080d1a; --cyan:#00d4ff; --blue:#4a9eff; --txt:#e8edf5; --muted:#8899aa; --dim:#556070; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--txt); font-family:"IBM Plex Sans",sans-serif;
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; text-align:center; padding:2rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,212,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 100%, rgba(74,158,255,0.05) 0%, transparent 70%);
    }
    .logo { display:flex; align-items:center; gap:0.65rem; text-decoration:none; margin-bottom:3rem; }
    .logo img { height:40px; width:40px; object-fit:contain; mix-blend-mode:screen; filter:drop-shadow(0 0 12px rgba(0,212,255,0.5)); }
    .logo-text { font-family:"Exo 2",sans-serif; font-weight:800; font-size:1.3rem; }
    .logo-text .mcp { color:#fff; } .logo-text .demo { color:var(--cyan); }
    .code {
      font-family:"Exo 2",sans-serif; font-weight:900;
      font-size:clamp(5rem,20vw,9rem); line-height:1;
      color:transparent;
      background:linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
      -webkit-background-clip:text; background-clip:text;
      margin-bottom:0.5rem;
    }
    h1 { font-family:"Exo 2",sans-serif; font-weight:800; font-size:clamp(1.4rem,3vw,2rem); color:#fff; margin-bottom:0.75rem; }
    p { color:var(--muted); font-size:1rem; max-width:420px; line-height:1.7; margin-bottom:2.5rem; }
    .btn {
      display:inline-block; padding:0.8rem 2.25rem;
      background:var(--cyan); color:#080d1a; font-weight:700;
      font-size:0.95rem; border-radius:8px; text-decoration:none;
      transition:all 0.2s; margin-bottom:2rem;
    }
    .btn:hover { background:#00eeff; box-shadow:0 0 28px rgba(0,212,255,0.45); }
    .countdown { color:var(--dim); font-size:0.82rem; }
    .countdown span { color:var(--cyan); font-weight:600; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <img src="/logo.png" alt="MCP Demo" />
    <span class="logo-text"><span class="mcp">MCP</span><span class="demo">Demo</span></span>
  </a>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you&#8217;re looking for doesn&#8217;t exist or may have moved. You&#8217;ll be redirected to the homepage automatically.</p>
  <a href="/" class="btn">Take Me Home</a>
  <p class="countdown">Redirecting in <span id="sec">5</span> seconds&hellip;</p>
<script>
  var s=5, el=document.getElementById('sec');
  var t=setInterval(function(){ s--; el.textContent=s; if(s<=0){ clearInterval(t); window.location.href='/'; } },1000);
</script>
</body>
</html>
